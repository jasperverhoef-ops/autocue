<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Decorative scroll lines above -->
  <rect x="72" y="128" width="368" height="16" rx="8" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="72" y="156" width="260" height="16" rx="8" fill="#ffffff" fill-opacity="0.07"/>

  <!-- Focus band (teleprompter highlight) -->
  <rect x="48" y="192" width="416" height="100" rx="14" fill="url(#band)"/>
  <rect x="48" y="192" width="416" height="100" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- App name -->
  <text
    x="256" y="265"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="78"
    font-weight="800"
    letter-spacing="-3"
    fill="white"
    text-anchor="middle"
  >autocue</text>

  <!-- Decorative scroll lines below -->
  <rect x="72" y="312" width="368" height="16" rx="8" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="72" y="340" width="220" height="16" rx="8" fill="#ffffff" fill-opacity="0.04"/>

  <!-- Small play dot / cursor indicator -->
  <circle cx="48" cy="242" r="7" fill="#ffffff" fill-opacity="0.5"/>
</svg>
